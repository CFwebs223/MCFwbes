<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace Tennis Academy — Booking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a1008;color:#fff;overflow-x:hidden}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1a0a,#1a2d1a,#0a1a0a);position:relative;overflow:hidden;padding:80px 24px}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 60% 30%,rgba(50,200,100,0.06),transparent 60%)}
.badge{background:rgba(50,200,100,0.15);border:1px solid rgba(50,200,100,0.3);padding:6px 16px;border-radius:100px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#32c864;margin-bottom:24px}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;text-align:center;line-height:1.1;margin-bottom:16px}
.hero h1 span{color:#32c864}
.hero p{font-size:clamp(1rem,2vw,1.2rem);color:rgba(255,255,255,0.6);max-width:500px;text-align:center;line-height:1.6;margin-bottom:40px}
.booking{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:400px;margin-bottom:24px}
.booking input{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none}
.booking input:focus{border-color:#32c864}
.booking button{padding:14px;border-radius:12px;border:none;background:#32c864;color:#0a1008;font-weight:600;font-size:14px;cursor:pointer;transition:all .3s;grid-column:1/-1}
.booking button:hover{background:#40d874}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:800px;margin:60px auto 0;padding:0 24px}
.feature{text-align:center;padding:24px;background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.06)}
.feature .icon{font-size:2rem;margin-bottom:12px}
.feature h3{font-size:1rem;margin-bottom:4px}
.feature p{font-size:0.8rem;color:rgba(255,255,255,0.4)}
.nav{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,16,8,0.8);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(255,255,255,0.05)}
.logo{font-weight:700;font-size:1.1rem}
.logo span{color:#32c864}
@media(max-width:600px){.features{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="nav"><div class="logo">Ace<span>Tennis</span></div></nav>
<section class="hero">
<div class="badge">Booking Page</div>
<h1>Book a Court.<br><span>Play Better.</span></h1>
<p>Premium tennis coaching in Cape Town. Book your session in seconds — no sign-up required.</p>
<div class="booking">
<input type="date" value="2026-05-20">
<select style="padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none">
<option>Select time</option><option>06:00</option><option>07:00</option><option>08:00</option><option>09:00</option><option>10:00</option>
</select>
<button>Book Session — R250</button>
</div>
<div class="features">
<div class="feature"><div class="icon">🎾</div><h3>Pro Coaching</h3><p>ITF-certified coaches</p></div>
<div class="feature"><div class="icon">🏟️</div><h3>Floodlit Courts</h3><p>Play until late</p></div>
<div class="feature"><div class="icon">📊</div><h3>Video Analysis</h3><p>Track your progress</p></div>
</div>
</section>
</body>
</html>
