<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADE Goods — Online Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#080808;color:#fff;overflow-x:hidden}
.nav{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(8,8,8,0.9);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(255,255,255,0.05)}
.logo{font-weight:700;font-size:1.2rem;letter-spacing:-0.5px}
.cart{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hero{padding:120px 24px 60px;max-width:1200px;margin:0 auto;text-align:center}
.hero h1{font-size:clamp(2rem,4vw,3.5rem);font-weight:700;margin-bottom:12px}
.hero p{color:rgba(255,255,255,0.5);max-width:400px;margin:0 auto 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;max-width:1200px;margin:0 auto;padding:0 24px 80px}
.product{background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.06);padding:24px;transition:all .3s;cursor:pointer}
.product:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);transform:translateY(-4px)}
.product .image{width:100%;aspect-ratio:1;border-radius:12px;background:linear-gradient(135deg,#1a1a2e,#16213e);margin-bottom:16px;display:flex;align-items:center;justify-content:center;font-size:3rem}
.product h3{font-size:1rem;margin-bottom:4px}
.product .price{color:#64b5f6;font-weight:600}
.product .tag{font-size:0.75rem;color:rgba(255,255,255,0.3);margin-bottom:8px}
</style>
</head>
<body>
<nav class="nav"><div class="logo">MADE Goods</div><div class="cart">🛒</div></nav>
<section class="hero">
<h1>Essentials,<br>Designed to Last.</h1>
<p>Minimal products for a maximal life. Free shipping on orders over R500.</p>
</section>
<div class="grid">
<div class="product"><div class="image">🎒</div><div class="tag">Bags</div><h3>Canvas Daypack</h3><div class="price">R450</div></div>
<div class="product"><div class="image">⌚</div><div class="tag">Accessories</div><h3>Leather Strap Watch</h3><div class="price">R680</div></div>
<div class="product"><div class="image">📓</div><div class="tag">Stationery</div><h3>Linen Notebook Set</h3><div class="price">R220</div></div>
<div class="product"><div class="image">🎧</div><div class="tag">Tech</div><h3>Wooden Headphones</h3><div class="price">R890</div></div>
</div>
</body>
</html>
