<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Café — Landing Page</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0806;color:#fff;overflow-x:hidden}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a0a06,#2d1a10,#1a0a06);position:relative;overflow:hidden;padding:80px 24px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(180,120,80,0.08),transparent 60%)}
.badge{background:rgba(180,120,80,0.15);border:1px solid rgba(180,120,80,0.3);padding:6px 16px;border-radius:100px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#b47850;margin-bottom:24px}
.hero h1{font-size:clamp(2.5rem,6vw,5rem);font-weight:700;line-height:1.1;margin-bottom:16px}
.hero h1 em{font-style:italic;color:#b47850}
.hero p{font-size:clamp(1rem,2vw,1.2rem);color:rgba(255,255,255,0.6);max-width:480px;line-height:1.6;margin-bottom:40px}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-primary{padding:14px 32px;border-radius:100px;background:#b47850;color:#fff;border:none;font-weight:600;cursor:pointer;transition:all .3s}
.btn-primary:hover{background:#c88860;transform:translateY(-2px)}
.btn-secondary{padding:14px 32px;border-radius:100px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;transition:all .3s}
.btn-secondary:hover{background:rgba(255,255,255,0.05)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:600px;margin:60px auto 0;padding:0 24px}
.menu-item{padding:24px;background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.06)}
.menu-item .emoji{font-size:2rem;margin-bottom:8px}
.menu-item h4{font-size:0.95rem}
.menu-item p{font-size:0.8rem;color:rgba(255,255,255,0.4)}
@media(max-width:600px){.menu-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="hero">
<div class="badge">Landing Page</div>
<h1>Bloom<br><em>Café & Roastery</em></h1>
<p>Speciality coffee, homemade pastries, and the warmest corner in town. Open daily from 6am.</p>
<div class="btns">
<button class="btn-primary">View Menu</button>
<button class="btn-secondary">Find Us</button>
</div>
<div class="menu-grid">
<div class="menu-item"><div class="emoji">☕</div><h4>Speciality Coffee</h4><p>Single-origin beans</p></div>
<div class="menu-item"><div class="emoji">🥐</div><h4>Fresh Pastries</h4><p>Baked in-house daily</p></div>
<div class="menu-item"><div class="emoji">🌿</div><h4>Plant-Based</h4><p>Vegan-friendly options</p></div>
</div>
</section>
</body>
</html>
